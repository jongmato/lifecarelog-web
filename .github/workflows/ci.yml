name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript 타입 검사
        run: pnpm typecheck

      - name: ESLint 린트
        run: pnpm lint

      - name: Next.js 프로덕션 빌드 검증
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: https://lifecarelog.co.kr
